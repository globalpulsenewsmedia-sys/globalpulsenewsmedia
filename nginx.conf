events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip Compression for Fast Page Loads (SEO benefit)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # 1. Arbitrage Smart AI Server Block (Default Listener)
    server {
        listen 80 default_server;
        server_name arbitragesmartai.com www.arbitragesmartai.com localhost;

        root /var/www/html;
        index index.html;

        # SECURITY HEADERS LAYER
        add_header Content-Security-Policy "default-src 'self' https: 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https:; connect-src 'self' wss: https:; frame-ancestors 'none';" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # WebSocket Gateway Reverse Proxy (telemetry service)
        location /ws/ {
            proxy_pass http://host.docker.internal:8002/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400; # Keep connection open
        }
    }
}
