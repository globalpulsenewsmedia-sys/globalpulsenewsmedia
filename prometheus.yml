global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'arbitrage-cex-scanner'
    static_configs:
      # Refers to host machine IP or docker bridge gateway
      - targets: ['host.docker.internal:8000']

  - job_name: 'arbitrage-dex-scanner'
    static_configs:
      - targets: ['host.docker.internal:8001']
