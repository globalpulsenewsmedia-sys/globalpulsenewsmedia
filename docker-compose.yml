version: '3.8'

services:
  # High-performance Timeseries Database
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: arbitrage_timescaledb
    restart: always
    environment:
      - POSTGRES_DB=arbitrage_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=arbitrage_secure_pass
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data

  # Hot-Cache Layer
  redis:
    image: redis:alpine
    container_name: arbitrage_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Distributed Messaging Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: arbitrage_zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # Distributed Messaging Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: arbitrage_kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  # Metrics Scraper Observability
  prometheus:
    image: prom/prometheus:latest
    container_name: arbitrage_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - timescaledb

  # Visual Analytics Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: arbitrage_grafana
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # Nginx Reverse Proxy Gateway
  nginx:
    image: nginx:alpine
    container_name: arbitrage_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - .:/var/www/html:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - timescaledb

volumes:
  timescale_data:
  redis_data:
  prometheus_data:
  grafana_data:
