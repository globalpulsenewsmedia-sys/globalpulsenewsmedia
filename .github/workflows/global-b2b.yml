name: Global B2B Lead Generator

on:
  schedule:
    - cron: '0 2 * * *' # Every day at 2:00 AM UTC
  workflow_dispatch:

jobs:
  leadgen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Run Lead Discovery
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/lead-generator.mjs

      - name: Run Outreach Engine
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: node scripts/b2b-outreach.mjs

      - name: Commit & Push Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git commit -m "Auto-update B2B Leads & Backups [skip ci]" || echo "No changes"
          git push origin main
