name: 24/7 Automated News Fetcher

on:
  schedule:
    # Runs at minute 0 past every 3rd hour
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allows manual trigger from github UI

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Fetch Script
        run: node scripts/fetch-news.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and Push Data
        run: |
          git config --local user.email "manikkatke93-star@users.noreply.github.com"
          git config --local user.name "manikkatke93-star"
          git add data/news.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated news update: $(date)" && git push)
