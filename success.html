<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligence Secured | Global Pulse PRO</title>
    <link rel="stylesheet" href="css/index.css">
    <style>
        body { background: #000; color: #fff; text-align: center; padding: 100px 20px; font-family: 'Roboto', sans-serif; }
        .success-card { max-width: 600px; margin: 0 auto; background: #050505; border: 1px solid #ffd700; padding: 60px; border-radius: 20px; box-shadow: 0 0 50px rgba(255,215,0,0.1); }
        .checkmark { font-size: 4rem; color: #ffd700; margin-bottom: 20px; }
        h1 { font-weight: 900; margin-bottom: 20px; }
        p { color: #888; font-size: 1.1rem; margin-bottom: 40px; }
        .btn-lounge { background: #ffd700; color: #000; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: 900; }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="checkmark">✔</div>
        <h1>Intelligence Secured</h1>
        <p>Your payment has been verified. You now have full access to the Global Pulse PRO Lounge and high-frequency AI signals.</p>
        <div id="paymentIdDisplay" style="font-family: monospace; color: #444; font-size: 0.7rem; margin-bottom: 30px;"></div>
        <a href="pro.html" class="btn-lounge">ENTER PRO LOUNGE</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const paymentId = urlParams.get('payment_id');
        if (paymentId) {
            document.getElementById('paymentIdDisplay').innerText = "TRANSACTION ID: " + paymentId;
        }
    </script>
</body>
</html>
